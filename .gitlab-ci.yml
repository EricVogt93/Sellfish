# Sellfish — GitLab CI (test pipeline)
# Runs backend unit + integration tests (Testcontainers: Postgres+pgvector, MinIO)
# on a Docker-capable runner via Docker-in-Docker.
stages:
  - test

test:backend:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  services:
    - name: docker:24.0-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    # Pre-fetch fewer deps into the runner-local .m2 cache
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  cache:
    key: maven-${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  script:
    - cd backend
    - mvn -B verify
    - |
      awk -F, 'NR>1{tm+=$8; tc+=$9} END{tot=tm+tc; printf "Line coverage: %.1f%% (%d/%d)\n", tc/tot*100, tc, tot}' \
        target/site/jacoco/jacoco.csv || true
  artifacts:
    when: always
    paths:
      - backend/target/site/jacoco/
      - backend/target/surefire-reports/
      - backend/target/failsafe-reports/
    expire_in: 1 week
