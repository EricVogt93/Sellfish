# Sellfish — GitLab CI
# Unit tests run on any runner (no Docker needed). Integration tests (Testcontainers)
# require a Docker-capable runner with working DinD networking; run them via
# `mvn verify` locally or on a runner that exposes Docker.
stages:
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

test:backend:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  cache:
    key: maven-${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  script:
    - cd backend
    - mvn -B test
    - |
      awk -F, 'NR>1{tm+=$8; tc+=$9} END{tot=tm+tc; printf "Unit line coverage: %.1f%% (%d/%d)\n", tc/tot*100, tc, tot}' \
        target/site/jacoco/jacoco.csv || true
  artifacts:
    when: always
    paths:
      - backend/target/site/jacoco/
      - backend/target/surefire-reports/
    expire_in: 1 week
