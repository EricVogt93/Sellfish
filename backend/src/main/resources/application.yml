spring:
  application:
    name: bewerbungsatze
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bewerbungsatze}
    username: ${DB_USER:bewerbungsatze}
    password: ${DB_PASSWORD:bewerbungsatze}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    placeholders:
      embeddingDim: ${EMBEDDING_DIM:768}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

spring:
  ai:
    mcp:
      server:
        name: bewerbungsatze-mcp
        version: 0.1.0
        type: SYNC
        capabilities:
          tool: true

app:
  enterprise:
    # Enterprise-Feature-Toggles. Bei enabled=true wird zusaetzlich zur Liste unten
    # auch eine RSA-signierte Lizenz akzeptiert (Upload via /api/admin/license).
    enabled: ${ENTERPRISE_ENABLED:false}
    public-key: ${ENTERPRISE_PUBLIC_KEY:}
    features:
      sso: false
      multi-tenant: false
      reports: false
      audit-log: false
      ha: false
  sso:
    # SSO/OIDC. enabled=true aktiviert /api/auth/sso/{provider}/login und Callback.
    # Die Provider-Liste wird als YAML-Liste konfiguriert.
    enabled: ${SSO_ENABLED:false}
    redirect-uri: ${SSO_REDIRECT_URI:http://localhost:5173/auth/callback}
    providers: []
  embedding:
    # Vektor-Dimension; muss zum gewählten Embedding-Modell passen (z. B. nomic-embed-text=768,
    # OpenAI text-embedding-3-small=1536). Greift nur beim ersten Anlegen des Schemas.
    dimension: ${EMBEDDING_DIM:768}
  security:
    jwt:
      # Base64-kodiertes HMAC-Secret. In Produktion via ENV / Infisical setzen!
      secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMzJieXRlcyE=}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL:30}
      refresh-token-ttl-days: ${JWT_REFRESH_TTL:14}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  crypto:
    # Master-Key (Base64, 32 Byte) für AES-GCM-Verschlüsselung von Per-User-API-Keys.
    master-key: ${CRYPTO_MASTER_KEY:ZGV2LW9ubHktbWFzdGVyLWtleS0zMi1ieXRlcy1vayE=}
  infisical:
    enabled: ${INFISICAL_ENABLED:false}
    base-url: ${INFISICAL_URL:https://app.infisical.com}
    client-id: ${INFISICAL_CLIENT_ID:}
    client-secret: ${INFISICAL_CLIENT_SECRET:}
    project-id: ${INFISICAL_PROJECT_ID:}
    environment: ${INFISICAL_ENV:prod}
  storage:
    backend: ${STORAGE_BACKEND:fs}        # fs | minio
    fs-root: ${STORAGE_FS_ROOT:./data/storage}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket: ${MINIO_BUCKET:bewerbungsatze}

logging:
  level:
    de.bewerbungsatze: INFO
