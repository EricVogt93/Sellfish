spring:
  application:
    name: sellfish
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sellfish}
    username: ${DB_USER:sellfish}
    password: ${DB_PASSWORD:sellfish}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    placeholders:
      embeddingDim: ${EMBEDDING_DIM:768}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

spring:
  ai:
    mcp:
      server:
        name: sellfish-mcp
        version: 0.1.0
        type: SYNC
        capabilities:
          tool: true

app:
  enterprise:
    # Enterprise feature toggles. When enabled=true, an RSA-signed license is additionally
    # accepted (upload via /api/admin/license) on top of the flags below.
    enabled: ${ENTERPRISE_ENABLED:false}
    public-key: ${ENTERPRISE_PUBLIC_KEY:}
    features:
      sso: false
      multi-tenant: false
      reports: false
      audit-log: false
      ha: false
  sso:
    # SSO/OIDC. enabled=true activates /api/auth/sso/{provider}/login and the callback.
    # The provider list is configured as a YAML list.
    enabled: ${SSO_ENABLED:false}
    redirect-uri: ${SSO_REDIRECT_URI:http://localhost:5173/auth/callback}
    providers: []
  embedding:
    # Vector dimension; must match your embedding model (e.g. nomic-embed-text=768,
    # OpenAI text-embedding-3-small=1536). Only takes effect on first schema creation.
    dimension: ${EMBEDDING_DIM:768}
  security:
    jwt:
      # Base64-encoded HMAC secret. In production, set via env / Infisical!
      secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMzJieXRlcyE=}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL:30}
      refresh-token-ttl-days: ${JWT_REFRESH_TTL:14}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  crypto:
    # Master key (Base64, 32 bytes) for AES-GCM encryption of per-user API keys.
    master-key: ${CRYPTO_MASTER_KEY:ZGV2LW9ubHktbWFzdGVyLWtleS0zMi1ieXRlcy1vayE=}
  infisical:
    enabled: ${INFISICAL_ENABLED:false}
    base-url: ${INFISICAL_URL:https://app.infisical.com}
    client-id: ${INFISICAL_CLIENT_ID:}
    client-secret: ${INFISICAL_CLIENT_SECRET:}
    project-id: ${INFISICAL_PROJECT_ID:}
    environment: ${INFISICAL_ENV:prod}
  storage:
    backend: ${STORAGE_BACKEND:fs}        # fs | minio
    fs-root: ${STORAGE_FS_ROOT:./data/storage}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket: ${MINIO_BUCKET:sellfish}

logging:
  level:
    de.sellfish: INFO
