name: Deploy

# Manuell auslösbar. Setzt voraus, dass auf dem Server das Repo (infra/docker-compose.prod.yml
# + infra/Caddyfile) samt konfigurierter infra/.env liegt und folgende Repository-Secrets
# gesetzt sind: SSH_HOST, SSH_USER, SSH_KEY (privater Key), optional SSH_PORT, DEPLOY_PATH
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image-Tag (z. B. latest oder v1.0.0)"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Remote pull & up
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH || '/opt/bewerbungsatze' }}"
            export IMAGE_TAG="${{ github.event.inputs.tag }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin || true
            docker compose -f infra/docker-compose.prod.yml pull
            docker compose -f infra/docker-compose.prod.yml up -d
            docker image prune -f
