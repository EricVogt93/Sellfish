name: bewerbungsatze

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bewerbungsatze
      POSTGRES_USER: bewerbungsatze
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bewerbungsatze}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bewerbungsatze"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optionales self-hosted LLM. Auskommentiert, da speicherintensiv.
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollamadata:/root/.ollama

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bewerbungsatze
      DB_USER: bewerbungsatze
      DB_PASSWORD: ${DB_PASSWORD:-bewerbungsatze}
      JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMzJieXRlcyE=}
      CRYPTO_MASTER_KEY: ${CRYPTO_MASTER_KEY:-ZGV2LW9ubHktbWFzdGVyLWtleS0zMmJ5dGVzLWxvbmchISE=}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      INFISICAL_ENABLED: ${INFISICAL_ENABLED:-false}
      INFISICAL_URL: ${INFISICAL_URL:-https://app.infisical.com}
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:
  miniodata:
  # ollamadata:
