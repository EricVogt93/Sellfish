events {}

http {
  upstream backend  { server backend:8080; }
  upstream frontend { server frontend:3000; }

  # Uploads (CV, Zeugnisse) bis 30 MB.
  client_max_body_size 30m;

  server {
    listen 80;

    # API & Tooling -> Spring-Boot-Backend
    location /api/            { proxy_pass http://backend; include /etc/nginx/proxy.conf; }
    location /actuator/       { proxy_pass http://backend; include /etc/nginx/proxy.conf; }
    location /v3/api-docs     { proxy_pass http://backend; include /etc/nginx/proxy.conf; }
    location /swagger-ui      { proxy_pass http://backend; include /etc/nginx/proxy.conf; }
    location /swagger-ui.html { proxy_pass http://backend; include /etc/nginx/proxy.conf; }

    # Alles übrige -> SvelteKit-Frontend (Node-Adapter)
    location / { proxy_pass http://frontend; include /etc/nginx/proxy.conf; }
  }
}
