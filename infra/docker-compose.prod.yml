name: bewerbungsatze-prod

# Produktions-Setup: zieht die in der CD gebauten Images aus GHCR und stellt
# alles hinter einem nginx-Reverse-Proxy bereit (Single-Origin auf Port 80).
#
#   cp .env.example .env   # Werte setzen (Secrets!)
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bewerbungsatze
      POSTGRES_USER: bewerbungsatze
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bewerbungsatze"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/ericvogt93/bewerbungsatze-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bewerbungsatze
      DB_USER: bewerbungsatze
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      CRYPTO_MASTER_KEY: ${CRYPTO_MASTER_KEY:?set CRYPTO_MASTER_KEY}
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      # Muss zur Dimension des Embedding-Modells passen (nur beim ersten DB-Start wirksam).
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      CORS_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost}
      INFISICAL_ENABLED: ${INFISICAL_ENABLED:-false}
      INFISICAL_URL: ${INFISICAL_URL:-https://app.infisical.com}
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/ericvogt93/bewerbungsatze-frontend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    environment:
      # ":80" = lokal/ohne TLS; eine Domain (z. B. jobs.example.com) aktiviert Auto-TLS.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  miniodata:
  caddydata:
  caddyconfig:
